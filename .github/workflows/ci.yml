name: CI

on:
  push:
    paths:
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "apps/sdk/package.json"
      - "apps/sdk/bun.lock"
      - "apps/sdk/tsconfig.json"
      - "apps/sdk/tsconfig.types.json"
      - "apps/sdk/scripts/**"
      - "apps/sdk/src/**"
      - "apps/sdk/tests/**"
      - "apps/sdk/test-d/**"
      - "apps/sdk/examples/**"
      - "apps/docs/package.json"
      - "apps/docs/astro.config.mjs"
      - "apps/docs/tsconfig.json"
      - "apps/docs/src/**/*.ts"
      - "apps/docs/src/**/*.tsx"
      - "apps/docs/src/**/*.mjs"
      - "apps/docs/src/**/*.js"
  pull_request:
    paths:
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "apps/sdk/package.json"
      - "apps/sdk/bun.lock"
      - "apps/sdk/tsconfig.json"
      - "apps/sdk/tsconfig.types.json"
      - "apps/sdk/scripts/**"
      - "apps/sdk/src/**"
      - "apps/sdk/tests/**"
      - "apps/sdk/test-d/**"
      - "apps/sdk/examples/**"
      - "apps/docs/package.json"
      - "apps/docs/astro.config.mjs"
      - "apps/docs/tsconfig.json"
      - "apps/docs/src/**/*.ts"
      - "apps/docs/src/**/*.tsx"
      - "apps/docs/src/**/*.mjs"
      - "apps/docs/src/**/*.js"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-checks:
    name: Workspace Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck workspace
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Build workspace
        run: bun run build

      - name: Check publishable SDK package
        run: bunx publint apps/sdk
